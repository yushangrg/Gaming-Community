name: Gaming Community CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ✅ Job 1: Build and check code
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Check app for syntax errors
        run: node --check app/app.js

  # 🐳 Job 2: Docker stack test
  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and start all containers
        run: docker compose up -d --build

      - name: Wait for MySQL to initialise
        run: |
          echo "Waiting for services..."
          sleep 25

      - name: Check app is running on port 3000
        run: curl -f http://localhost:3000 || exit 1

      - name: Check phpMyAdmin is running on port 8081
        run: curl -f http://localhost:8081 || exit 1

      - name: Tear down containers
        run: docker compose down
