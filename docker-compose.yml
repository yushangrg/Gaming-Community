version: '3'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - db
    volumes:
      - .:/app
    command: npm start

  db:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sprint3
    ports:
      - "3306:3306"
    volumes:
      - ./sd2-db.sql:/docker-entrypoint-initdb.d/init.sql